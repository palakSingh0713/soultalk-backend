<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"> <!-- Use UTF-8 -->
  <title>Groq Chatbot</title>
  <style>
    /* Simple styling for clarity */
    #chatLog { max-width: 500px; margin: 1em auto; padding: 10px; border: 1px solid #ccc; }
    .message { margin: 5px 0; }
    .you { color: blue; }
    .bot { color: green; }
    input, button { padding: 8px; font-size: 1em; }
  </style>
</head>
<body>
  <div id="chatLog"></div>
  <input id="userInput" type="text" placeholder="Type a message..." autofocus>
  <button id="sendButton">Send</button>

  <script src="chat.js"></script>
</body>
</html>
